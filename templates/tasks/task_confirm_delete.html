{% extends "base.html" %}

{% block title %}Видалення завдання{% endblock %}

{% block content %}
<div class="container mt-5">
    <div class="card shadow">
        <div class="card-header bg-danger text-white">
            <h3 class="mb-0">Видалення завдання</h3>
        </div>

        <div class="card-body">
            <p class="fs-5">
                Ви впевнені, що хочете видалити завдання
                <strong>"{{ object.title }}"</strong>?
            </p>

            <form method="post">
                {% csrf_token %}

                <button type="submit" class="btn btn-danger">
                    🗑 Видалити
                </button>

                <a href="{% url 'tasks:task_list' %}" class="btn btn-secondary">
                    Скасувати
                </a>
            </form>
        </div>
    </div>
</div>
{% endblock %}
