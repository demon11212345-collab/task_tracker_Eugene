{% extends "base.html" %}

{% block title %}
    {% if object %}
        Редагування завдання
    {% else %}
        Створення завдання
    {% endif %}
{% endblock %}

{% block content %}
<div class="container mt-4">
    <div class="card shadow">
        <div class="card-header">
            <h2>
                {% if object %}
                    Редагування завдання
                {% else %}
                    Створення завдання
                {% endif %}
            </h2>
        </div>

        <div class="card-body">
            <form method="post">
                {% csrf_token %}

                {{ form.as_p }}

                <button type="submit" class="btn btn-primary">
                    Зберегти
                </button>

                <a href="{% url 'tasks:task_list' %}" class="btn btn-secondary">
                    Скасувати
                </a>
            </form>
        </div>
    </div>
</div>
{% endblock %}
